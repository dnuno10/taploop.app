<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TapLoop</title>
  <script>
    (function() {
      // Preserve the deep link before redirecting to the SPA shell.
      // Safari/iOS can throw on sessionStorage access in older/privacy contexts,
      // so we fall back to a query parameter instead of leaving the page blank.
      var path = window.location.pathname + window.location.search + window.location.hash;
      var target = '/';

      try {
        sessionStorage.setItem('spa_redirect', path);
      } catch (error) {
        target += '?p=' + encodeURIComponent(path);
      }

      window.location.replace(target);
    })();
  </script>
</head>
<body></body>
</html>
